<!DOCTYPE html>
<html>
<head>
    <title>Register FIR - Observation View</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Online eFIR Complaint Registration</h2>

        <div class="form-group">
            <label>Name:</label>
            <input type="text" placeholder="Enter your full name" />
        </div>

        <div class="form-group">
            <label>Mobile:</label>
            <input type="text" placeholder="Enter mobile number" />
        </div>

        <div class="form-group">
            <label>Incident Date:</label>
            <input type="date" />
        </div>

        <div class="form-group">
            <label>Incident Place:</label>
            <input type="text" placeholder="Enter incident location" />
        </div>

        <div class="form-group">
            <label>Description:</label>
            <textarea placeholder="Describe the incident in detail"></textarea>
        </div>

        <button class="btn">Submit FIR</button>
    </div>
</body>
</html>
